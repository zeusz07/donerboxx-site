
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DonerBoxx | Destek Ol</title>
  <script src="https://js.stripe.com/v3/"></script>
  <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 500px;
      transition: all 0.3s ease;
    }
    .container:hover {
      transform: scale(1.01);
    }
    h1 {
      color: #e74c3c;
      margin-bottom: 10px;
    }
    select, input {
      padding: 12px;
      margin: 10px 0;
      width: 100%;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      padding: 14px;
      width: 100%;
      background-color: #e74c3c;
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
    }
    .paypal-button {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">DonerBoxx</h1>
    <select id="language" onchange="changeLanguage()">
      <option value="tr">Türkçe</option>
      <option value="en">English</option>
    </select>
    <p id="desc">Bağış yapmak istediğiniz tutarı girin:</p>
    <input type="number" id="amount" placeholder="Tutar" />
    <select id="currency">
      <option value="usd">USD</option>
      <option value="try">TRY</option>
    </select>
    <button onclick="donateStripe()" id="donateBtn">Kredi Kartı ile Bağış</button>
    <div class="paypal-button" id="paypal-button-container"></div>
  </div>

<script>
  const stripe = Stripe("pk_test_51R4UxLFAk3cBFOLLigi5HUlp9ewoNUhCfDTR0wDzNa41aUtaPZdZgcm7jaP9yJL4Vt6XtczDfKqBELBJCCLuGqyc00K4zZgaqw");

  function donateStripe() {
    const amount = document.getElementById("amount").value;
    if (!amount || amount <= 0) {
      alert("Lütfen geçerli bir tutar girin.");
      return;
    }
    fetch("https://donerboxx-stripe.glitch.me/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ amount: amount })
    })
    .then(res => res.json())
    .then(data => stripe.redirectToCheckout({ sessionId: data.id }))
    .catch(err => alert("Stripe bağlantısı başarısız: " + err));
  }

  paypal.Buttons({
    createOrder: function(data, actions) {
      const amount = document.getElementById("amount").value;
      const currency = document.getElementById("currency").value.toUpperCase();
      return actions.order.create({
        purchase_units: [{
          amount: {
            value: amount,
            currency_code: currency
          }
        }]
      });
    },
    onApprove: function(data, actions) {
      return actions.order.capture().then(function(details) {
        alert('Teşekkürler ' + details.payer.name.given_name + '!');
      });
    }
  }).render('#paypal-button-container');

  function changeLanguage() {
    const lang = document.getElementById("language").value;
    if (lang === "en") {
      document.getElementById("title").innerText = "DonerBoxx";
      document.getElementById("desc").innerText = "Enter the amount you want to donate:";
      document.getElementById("donateBtn").innerText = "Donate with Credit Card";
    } else {
      document.getElementById("title").innerText = "DonerBoxx";
      document.getElementById("desc").innerText = "Bağış yapmak istediğiniz tutarı girin:";
      document.getElementById("donateBtn").innerText = "Kredi Kartı ile Bağış";
    }
  }
</script>
</body>
</html>
